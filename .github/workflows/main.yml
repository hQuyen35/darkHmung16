<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc mừng 1/6</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background-image:url("nen.jpg");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.page{
display:none;
color:white;
padding:30px;
animation:fade .8s;
}

.active{
display:block;
}

button{
padding:12px 24px;
margin:10px;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

.photo{
width:300px;
max-width:80vw;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.4);
animation:zoom 2s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes zoom{
from{
transform:scale(0);
}
to{
transform:scale(1);
}
}

.heart{
position:absolute;
font-size:25px;
animation:fly 5s linear infinite;
}

@keyframes fly{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}

</style>
</head>

<body>

<div id="page1" class="page active">

<h1>Nay là ngày mấy?</h1>

<br>

<button onclick="nextPage(2)">
1/6
</button>

<button onclick="nextPage(2)">
Quốc tế thiếu nhi
</button>

</div>

<div id="page2" class="page">

<h1>Tôi là...</h1>

<br>

<button onclick="nextPage(3)">
Chó
</button>

<button onclick="nextPage(3)">
Tôm
</button>

</div>

<div id="page3" class="page">

<h2>Lời chúc dành cho bé 💖</h2>

<br>

<p>

=== VIẾT LỜI CHÚC Ở ĐÂY ===

</p>

<br><br>

<button onclick="nextPage(4)">
Tiếp tục
</button>

<button onclick="showPlee()">
Hết
</button>

</div>

<div id="page4" class="page">

<h2>💖 Dành riêng cho bé 💖</h2>

<br>

<img src="anh.jpg" class="photo">

<br><br>

<audio id="music" controls loop>
<source src="nhac.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function nextPage(page){

document
.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document
.getElementById("page"+page)
.classList.add("active");

if(page===4){

document
.getElementById("music")
.play();

createHearts();

}

}

function showPlee(){

document.body.innerHTML=
"<h1 style='color:white'>PLÈ 😝</h1>";

}

function createHearts(){

for(let i=0;i<30;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.className="heart";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=
(3+Math.random()*4)+"s";

document.body.appendChild(heart);

}

}

</script>

</body>
</html>
